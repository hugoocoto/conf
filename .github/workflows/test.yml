name: test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential curl
      - name: Build and install latest Lua from source
        run: |
          curl -L -R -O https://www.lua.org/ftp/lua-5.5.0.tar.gz
          tar zxf lua-5.5.0.tar.gz
          cd lua-5.5.0
          make linux
          sudo make install
          sudo ldconfig
      - name: Build project
        run: make
      - name: Run tests
        run: make test
